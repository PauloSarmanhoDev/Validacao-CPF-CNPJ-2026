<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPF & CNPJ para Devs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <h1>CPF & CNPJ para Devs</h1>
            </div>
            <p class="subtitle">Gerador e Validador compatível com o novo CNPJ Alfanumérico (2026)</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="tab-gerador">Gerador</button>
            <button class="tab-btn" data-target="tab-validador">Validador</button>
            <button class="tab-btn" data-target="tab-exemplos">Código (Exemplos)</button>
        </div>

        <main class="tab-content-wrapper">
            <!-- ABA: GERADOR -->
            <section id="tab-gerador" class="tab-content active">
                <div class="controls">
                    <button class="action-btn" onclick="gerarCPF()">Gerar CPF</button>
                    <button class="action-btn" onclick="gerarCNPJ(false)">Gerar CNPJ (Numérico)</button>
                    <button class="action-btn" onclick="gerarCNPJ(true)">Gerar CNPJ (Alfanumérico)</button>
                </div>

                <div class="result-box">
                    <label>Com Máscara</label>
                    <div class="input-group">
                        <input type="text" id="output-mask" readonly placeholder="Gere um documento clicando acima" />
                        <button class="copy-btn" onclick="copiarValor('output-mask')">Copiar</button>
                    </div>
                </div>

                <div class="result-box">
                    <label>Somente Números / Letras</label>
                    <div class="input-group">
                        <input type="text" id="output-clean" readonly placeholder="Gere um documento clicando acima" />
                        <button class="copy-btn" onclick="copiarValor('output-clean')">Copiar</button>
                    </div>
                </div>
            </section>

            <!-- ABA: VALIDADOR -->
            <section id="tab-validador" class="tab-content">
                <div class="result-box">
                    <label>Informe o CPF ou CNPJ</label>
                    <div class="input-group">
                        <input type="text" id="input-validador" placeholder="Digite caracteres, com ou sem pontuação" />
                        <button class="action-btn" onclick="validarDocumento()">Validar</button>
                    </div>
                </div>

                <div id="validation-result" class="validation-message" style="display: none;"></div>
            </section>

            <!-- ABA: EXEMPLOS -->
            <section id="tab-exemplos" class="tab-content">
                <div class="filters-row">
                    <select id="code-lang-selector" onchange="renderCodeExample()">
                        <option value="java" selected>Java</option>
                        <option value="csharp">C#</option>
                        <option value="ts">TypeScript</option>
                        <option value="js">JavaScript</option>
                        <option value="rust">Rust</option>
                        <option value="go">Go (Golang)</option>
                        <option value="swift">Swift</option>
                        <option value="kotlin">Kotlin</option>
                        <option value="sql">SQL (PostgreSQL)</option>
                        <option value="oracle">SQL (Oracle)</option>
                    </select>

                    <select id="code-cat-selector" onchange="renderCodeExample()">
                        <option value="cpf" selected>Validar CPF</option>
                        <option value="cnpj">Validar CNPJ (Numérico)</option>
                        <option value="cnpj_alpha">Validar CNPJ Alfanumérico (2026)</option>
                        <option value="todos">Todos (CPF + CNPJ unificado)</option>
                    </select>
                </div>

                <div class="code-box">
                    <pre><code id="code-viewer" class="language-java"><!-- code injected by js --></code></pre>
                </div>
            </section>
        </main>

        <div class="pix-donation">
            <p>Se isso te salvou algum tempo...</p>
            <span>Um PIX de agradecimento é bem-vindo 😉 👇</span>
            <div class="input-group">
                <input type="text" id="pix-key" value="2b68cb70-658e-4791-b616-a6741153c368" readonly />
                <button class="copy-btn pix" onclick="copiarValor('pix-key')">Copiar PIX</button>
            </div>
        </div>

        <div id="toast" class="toast">Ação concluída com sucesso!</div>

        <footer class="footer-info">
            <div class="footer-links">
                <a href="https://www.linkedin.com/in/paulo-sarmanho/" target="_blank" rel="noopener noreferrer"
                    class="footer-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                        <rect x="2" y="9" width="4" height="12"></rect>
                        <circle cx="4" cy="4" r="2"></circle>
                    </svg>
                    Paulo Sarmanho
                </a>

                <a href="https://github.com/PauloSarmanhoDev/Validacao-CPF-CNPJ-2026" target="_blank"
                    rel="noopener noreferrer" class="footer-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">

                    </svg>
                    Repositório do Projeto
                </a>

            </div>
            <p>© 2026 - Desenvolvido para a nova era fiscal</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="examples.js?v=3"></script>
    <script src="script.js"></script>
</body>

</html>
